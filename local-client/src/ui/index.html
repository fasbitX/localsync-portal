<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalSync Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top header -->
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
    <h1 class="topbar-title">LocalSync Portal</h1>
    <div class="topbar-status" id="syncIndicator">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <ul class="nav-list">
        <li class="nav-item active" data-view="folders">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>
          Folders
        </li>
        <li class="nav-item" data-view="contacts">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
          Contacts
        </li>
        <li class="nav-item" data-view="groups">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.97 5.97 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.97 5.97 0 004 15v3H1v-3a3 3 0 013.75-2.906zM10 12a5 5 0 015 5v3H5v-3a5 5 0 015-5z"/></svg>
          Groups
        </li>
        <li class="nav-item" data-view="invites">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
          Invites
        </li>
        <li class="nav-item" data-view="synclog">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
          Sync Log
        </li>
      </ul>
    </nav>

    <!-- Main content area -->
    <main class="content" id="content">
      <!-- Dynamically rendered by app.js -->
    </main>
  </div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Context menu (right-click on folder tree) -->
  <div class="context-menu" id="contextMenu">
    <ul class="context-menu-list">
      <li class="context-menu-item" data-action="subfolder">&#128194; Add Sub-folder</li>
      <li class="context-menu-item" data-action="invite">&#9993; Send Invites</li>
      <li class="context-menu-divider"></li>
      <li class="context-menu-item" data-action="rename">&#9998; Rename</li>
      <li class="context-menu-item context-menu-item--danger" data-action="delete">&#128465; Delete</li>
    </ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
